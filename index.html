<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tracking de Contactos</title>

<!-- Librerías -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
/* === TU CSS ORIGINAL SIN CAMBIOS === */
:root {
    --bg: #f0f0f0;
    --text: #000;
    --card: #ffffff;
    --header: #ee2323;
}

body.dark {
    --bg: #1e1e1e;
    --text: #e0e0e0;
    --card: #2b2b2b;
    --header: #ee2323;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

header { padding: 15px 20px; }

.actions { display: flex; gap: 10px; margin-top: 10px; }


button {
    padding: 8px 14px;
    cursor: pointer;
    border: none;
    border-radius: 8px;

    background: linear-gradient(145deg, #ff3b3b, #c81d1d);
    color: white;
    font-weight: bold;

    box-shadow:
        0 4px 6px rgba(0,0,0,0.25),
        inset 0 -2px 4px rgba(0,0,0,0.2);

    transition: all 0.15s ease;
}

/* Hover */
button:hover {
    transform: translateY(-2px);
    box-shadow:
        0 6px 10px rgba(0,0,0,0.3),
        inset 0 -2px 4px rgba(0,0,0,0.2);
}

/* Click (efecto presionado) */
button:active {
    transform: translateY(2px);
    box-shadow:
        inset 0 4px 6px rgba(0,0,0,0.3);
}


.container { display: flex; gap: 2%; padding: 20px; }

.table-container { width: 80%; }
.form-container { width: 20%; }

form, table { background: var(--card); border-radius: 8px; }
form { padding: 15px; }

label { display: block; margin-top: 10px; }

input, select, textarea {
    width: 100%;
    padding: 6px;
    margin-top: 4px;
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
    vertical-align: top;
    resize: horizontal;
    overflow: auto;
    min-width: 80px;
}

th {
    background: var(--header);
    color: rgb(255,255,255);
}

.titulo {
    text-align: center;
    color: #ee2323;
    font-size: 32px;
    margin-bottom: 15px;
}


/* ================================
   PERSONALIZACIÓN SOLO FORMULARIO
   ================================ */

:root {
    --form-bg: #f0f0f0;
    --form-text: #222222;
    --form-font: "Segoe UI", Arial, sans-serif;

    --form-input-bg: #ffffff;
    --form-input-text: #000000;
    --form-input-border: #bbbbbb;
    --form-input-focus: #ee2323;
}

/* CONTENEDOR 3D */
.form-container form {
    background: var(--form-bg);
    color: var(--form-text);
    font-family: var(--form-font);

    box-shadow:
        0 6px 10px rgba(0, 0, 0, 0.15),
        0 2px 4px rgba(0, 0, 0, 0.10);

    border-radius: 10px;
    transition: box-shadow 0.3s ease;
}

.form-container form:hover {
    box-shadow:
        0 10px 18px rgba(0, 0, 0, 0.25),
        0 4px 8px rgba(0, 0, 0, 0.15);
}

/* INPUTS ESTILIZADOS */
.form-container input,
.form-container select,
.form-container textarea {
    background: var(--form-input-bg);
    color: var(--form-input-text);
    border: 1px solid var(--form-input-border);
    font-family: var(--form-font);
    border-radius: 6px;
    padding: 6px;
    transition: all 0.2s ease;
}

.form-container input:focus,
.form-container select:focus,
.form-container textarea:focus {
    outline: none;
    border-color: var(--form-input-focus);
    box-shadow: 0 0 4px rgba(238, 35, 35, 0.6);
}

</style>
</head>

<body>

<header>
    <h1 class="titulo">Tracking RRSS</h1>
    <div class="actions">
        <button onclick="exportarExcel()">📁 Exportar Excel</button>
        <button onclick="copiarTablaImagen()">📸 Copiar tabla como imagen</button>

        <!-- NUEVOS BOTONES -->
        <button onclick="guardarRespaldo()">💾 Guardar respaldo</button>
        <button onclick="cargarRespaldo()">📂 Cargar respaldo</button>
    </div>
</header>

<div class="container">

<!-- TABLA -->
<div class="table-container">
<table id="tablaTracking">
<thead>
<tr>
    <th>Contacto</th>
    <th>Red Social / Medio</th>
    <th>Fecha | Hora</th>
    <th>Ingreso OM</th>
    <th>Número</th>
    <th>Detalles</th>
    <th>Atiende</th>
    <th>Comentario auditoría</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- FORMULARIO -->
<div class="form-container">
<form id="formTracking">

<label>Red Social / Medio</label>
<select id="medio" required>
    <option value="">-- Seleccione --</option>
    <option>WhatsApp</option>
    <option>Call Center</option>
    <option>Alerta grupo RRSS</option>
    <option>Agencias</option>
    <option>Messenger</option>
    <option>Instagram</option>
    <option>X</option>
    <option>Sistemas</option>
</select>

<label>Fecha</label>
<input type="date" id="fecha" required>

<label>Hora</label>
<select id="hora" required></select>

<label>Minutos</label>
<select id="minutos" required></select>

<label>Ingreso a OM</label>
<select id="ingresoOM" required>
    <option value="">-- Seleccione --</option>
    <option>Sí</option>
    <option>No</option>
</select>

<label>Número</label>
<input type="text" id="numero" value="N/A" required>

<label>Detalles</label>
<input type="text" id="detalles" value="N/A" required>

<label>Atiende</label>
<input type="text" id="atiende" value="N/A" required>

<label>Comentario auditoría</label>
<textarea id="comentario" required>N/A</textarea>

<button type="submit">Agregar registro</button>
</form>
</div>

</div>

<script>
let registros = [];

/* HORAS */
for (let h = 0; h < 24; h++) {
    let o = document.createElement("option");
    o.value = o.textContent = String(h).padStart(2, "0");
    hora.appendChild(o);
}

/* MINUTOS */
for (let m = 0; m < 60; m += 5) {
    let o = document.createElement("option");
    o.value = o.textContent = String(m).padStart(2, "0");
    minutos.appendChild(o);
}

formTracking.addEventListener("submit", e => {
    e.preventDefault();

    registros.push({
        medio: medio.value,
        fechaHora: `${fecha.value}T${hora.value}:${minutos.value}`,
        ingresoOM: ingresoOM.value,
        numero: numero.value,
        detalles: detalles.value,
        atiende: atiende.value,
        comentario: comentario.value
    });

    render();
    formTracking.reset();
    numero.value = detalles.value = atiende.value = comentario.value = "N/A";
});

function render() {
    const tbody = document.querySelector("#tablaTracking tbody");
    tbody.innerHTML = "";

    registros.sort((a, b) => new Date(a.fechaHora) - new Date(b.fechaHora));

    registros.forEach((r, index) => {
        let tr = document.createElement("tr");

        let tdContacto = document.createElement("td");
        tdContacto.textContent = index + 1;
        tr.appendChild(tdContacto);

        Object.entries(r).forEach(([k, v]) => {
            let td = document.createElement("td");
            td.textContent = k === "fechaHora"
                ? new Date(v).toLocaleString()
                : v;
            td.contentEditable = true;
            tr.appendChild(td);
        });

        tbody.appendChild(tr);
    });
}

/* ✅ EXPORTAR XLSX REAL */
function exportarExcel() {
    if (!registros.length) return alert("Sin datos");

    const data = [[
        "Contacto","Red Social / Medio","Fecha y Hora",
        "Ingreso OM","Número","Detalles","Atiende","Comentario auditoría"
    ]];

    registros.forEach((r, i) => {
        data.push([
            i+1, r.medio,
            new Date(r.fechaHora).toLocaleString(),
            r.ingresoOM, r.numero, r.detalles, r.atiende, r.comentario
        ]);
    });

    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Tracking");

    XLSX.writeFile(wb, "tracking.xlsx");
}

/* ✅ RESPALDO 30 DÍAS */
const STORAGE_KEY = "tracking_respaldos";
const EXP = 30*24*60*60*1000;

function guardarRespaldo(){
    if(!registros.length) return alert("No hay datos");

    let r = JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
    r.push({fecha:Date.now(),data:registros});

    localStorage.setItem(STORAGE_KEY, JSON.stringify(limpiar(r)));
    alert("✅ Guardado");
}

function cargarRespaldo(){
    let r = limpiar(JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"));
    if(!r.length) return alert("No hay respaldo");

    registros = r[r.length-1].data;
    render();
    alert("✅ Cargado");
}

function limpiar(r){
    const ahora = Date.now();
    const v = r.filter(x => ahora - x.fecha <= EXP);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(v));
    return v;
}

/* ORIGINAL */
function copiarTablaImagen() {
    html2canvas(document.getElementById("tablaTracking"))
    .then(canvas => canvas.toBlob(blob => {
        navigator.clipboard.write([
            new ClipboardItem({ "image/png": blob })
        ]);
        alert("✅ Tabla copiada como imagen");
    }));
}
</script>

</body>
</html>
